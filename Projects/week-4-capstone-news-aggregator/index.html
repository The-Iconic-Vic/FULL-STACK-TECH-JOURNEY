<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsHub | Week 4 Capstone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header>
            <h1>📰 NewsHub</h1>
            <p>Stay informed with the latest news</p>
        </header>

        <!-- Search Section -->
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Search for news...">
                <button id="search-btn">🔍 Search</button>
            </div>
        </div>

        <!-- Category Filters -->
        <div class="category-filters">
            <button class="filter-btn active" data-category="general">General</button>
            <button class="filter-btn" data-category="technology">Technology</button>
            <button class="filter-btn" data-category="business">Business</button>
            <button class="filter-btn" data-category="sports">Sports</button>
            <button class="filter-btn" data-category="entertainment">Entertainment</button>
            <button class="filter-btn" data-category="health">Health</button>
            <button class="filter-btn" data-category="science">Science</button>
        </div>

        <!-- Country Select -->
        <div class="country-select">
            <label>Country:</label>
            <select id="country-select">
                <option value="us">🇺🇸 United States</option>
                <option value="gb">🇬🇧 United Kingdom</option>
                <option value="ca">🇨🇦 Canada</option>
                <option value="au">🇦🇺 Australia</option>
                <option value="in">🇮🇳 India</option>
                <option value="ng">🇳🇬 Nigeria</option>
            </select>
        </div>

        <!-- Loading State -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Loading news...</p>
        </div>

        <!-- Error State -->
        <div id="error-message" class="error-message hidden"></div>

        <!-- Saved Articles Section -->
        <div class="saved-section">
            <button id="saved-toggle" class="saved-toggle">📌 Saved Articles (<span id="saved-count">0</span>)</button>
            <div id="saved-articles" class="saved-articles hidden"></div>
        </div>

        <!-- News Grid -->
        <div id="news-grid" class="news-grid"></div>

        <footer>
            <p>News data from GNews API | Week 4 Capstone Project</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
