<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Components | CSS Keyframes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Animated Components</h1>
        <p>CSS keyframe animations for interactive feedback</p>

        <div class="components-grid">
            <!-- Notification Bell -->
            <div class="component-card">
                <h2>🔔 Notification Bell</h2>
                <p>Hover to shake the bell</p>
                <div class="bell-container">
                    <div class="bell">🔔</div>
                </div>
            </div>

            <!-- Pulsing Button -->
            <div class="component-card">
                <h2>⚡ Pulsing Button</h2>
                <p>Indicates new activity</p>
                <button class="pulse-btn">New Activity!</button>
            </div>

            <!-- Loading Spinner -->
            <div class="component-card">
                <h2>⏳ Loading Spinner</h2>
                <p>Custom loading animation</p>
                <div class="spinner"></div>
            </div>

            <!-- Bouncing Element -->
            <div class="component-card">
                <h2>🎈 Bouncing Element</h2>
                <p>Continuous bounce animation</p>
                <div class="bounce-ball">⚽</div>
            </div>
        </div>
    </div>

</body>
</html>
