<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced Todo List | LocalStorage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>📝 Enhanced Todo List</h1>
        <p>Your tasks are saved automatically!</p>

        <div class="input-section">
            <input type="text" id="todo-input" placeholder="What needs to be done?">
            <button id="add-btn">Add Task</button>
        </div>

        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <div class="stats">
            <p>Total: <span id="total-count">0</span></p>
            <p>Active: <span id="active-count">0</span></p>
            <p>Completed: <span id="completed-count">0</span></p>
            <button id="clear-completed-btn">Clear Completed</button>
            <button id="clear-all-btn" class="clear-all">Clear All Data</button>
        </div>

        <ul id="todo-list">
            <li class="empty-message">No tasks yet. Add one above!</li>
        </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
