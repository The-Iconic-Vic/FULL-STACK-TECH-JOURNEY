<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Button | CSS Transitions & Transforms</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Interactive Button</h1>
        <p>Hover over the button to see transitions and transforms in action</p>

        <button class="interactive-btn">Hover Me</button>

        <div class="demo-section">
            <h2>What's happening?</h2>
            <ul>
                <li>🎨 Background color transitions smoothly</li>
                <li>📏 Scale transform on hover (grows slightly)</li>
                <li>✨ Box-shadow transition for depth</li>
                <li>⚡ All transitions are smooth and animated</li>
            </ul>
        </div>
    </div>

</body>
</html>
