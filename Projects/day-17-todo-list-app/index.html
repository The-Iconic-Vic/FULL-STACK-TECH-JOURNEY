<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List App | DOM Manipulation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>📝 Todo List App</h1>
        <p>Create, edit, complete, and delete tasks</p>

        <!-- Input Section -->
        <div class="input-section">
            <input type="text" id="todo-input" placeholder="What needs to be done?">
            <button id="add-btn">Add Task</button>
        </div>

        <!-- Filter Buttons -->
        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <!-- Stats -->
        <div class="stats">
            <p>Total: <span id="total-count">0</span></p>
            <p>Active: <span id="active-count">0</span></p>
            <p>Completed: <span id="completed-count">0</span></p>
            <button id="clear-completed-btn">Clear Completed</button>
        </div>

        <!-- Todo List -->
        <ul id="todo-list">
            <li class="empty-message">No tasks yet. Add one above!</li>
        </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
