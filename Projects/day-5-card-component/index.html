<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Component | Day 5 Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <img src="https://picsum.photos/id/104/400/250" alt="Landscape photography" class="card-image">
        <div class="card-content">
            <h3 class="card-title">Mountain Lake View</h3>
            <p class="card-description">
                Experience the breathtaking beauty of crystal clear waters surrounded by majestic peaks. 
                Perfect for hiking, photography, and peaceful retreats.
            </p>
            <button class="card-button">Learn More →</button>
        </div>
    </div>

</body>
</html>
