<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drawing Board | Mouse Events</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🎨 Drawing Board</h1>
        <p>Click and drag to draw with your mouse</p>

        <div class="controls">
            <label>Color: <input type="color" id="color-picker" value="#000000"></label>
            <label>Brush Size: <input type="range" id="brush-size" min="1" max="50" value="5"></label>
            <button id="clear-btn">Clear Canvas</button>
            <button id="eraser-btn">Eraser</button>
        </div>

        <canvas id="drawing-canvas" width="800" height="500"></canvas>

        <div class="demo-section">
            <h3>Mouse Events Demonstrated</h3>
            <ul>
                <li><strong>mousedown</strong> - Start drawing when mouse is pressed</li>
                <li><strong>mousemove</strong> - Draw while mouse moves</li>
                <li><strong>mouseup</strong> - Stop drawing when mouse released</li>
                <li><strong>mouseleave</strong> - Stop drawing if mouse leaves canvas</li>
            </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
