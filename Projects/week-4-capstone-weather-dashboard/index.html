<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard | Week 4 Capstone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header>
            <h1>⛅ Weather Dashboard</h1>
            <div class="temp-toggle">
                <button id="celsius-btn" class="temp-btn active">°C</button>
                <button id="fahrenheit-btn" class="temp-btn">°F</button>
            </div>
        </header>

        <!-- Search Section -->
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="city-input" placeholder="Enter city name..." value="London">
                <button id="search-btn">🔍 Search</button>
                <button id="geolocation-btn" class="geo-btn">📍 My Location</button>
            </div>
        </div>

        <!-- Recent Searches -->
        <div id="recent-searches" class="recent-searches hidden">
            <span>Recent:</span>
            <div id="recent-list" class="recent-list"></div>
        </div>

        <!-- Loading State -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Fetching weather data...</p>
        </div>

        <!-- Error State -->
        <div id="error-message" class="error-message hidden"></div>

        <!-- Main Weather Card -->
        <div id="weather-container" class="weather-container hidden">
            <div class="current-weather">
                <div class="weather-header">
                    <h2 id="city-name">London</h2>
                    <p id="weather-condition">Clear sky</p>
                </div>
                <div class="weather-main">
                    <img id="weather-icon" src="" alt="Weather icon">
                    <div class="temperature">
                        <span id="temp-value">22</span>
                        <span id="temp-unit">°C</span>
                    </div>
                </div>
                <div class="weather-details">
                    <div class="detail">
                        <span class="detail-label">🌡️ Feels like</span>
                        <span id="feels-like">22°C</span>
                    </div>
                    <div class="detail">
                        <span class="detail-label">💧 Humidity</span>
                        <span id="humidity">65%</span>
                    </div>
                    <div class="detail">
                        <span class="detail-label">💨 Wind speed</span>
                        <span id="wind-speed">5 km/h</span>
                    </div>
                    <div class="detail">
                        <span class="detail-label">📈 High/Low</span>
                        <span id="high-low">24° / 18°</span>
                    </div>
                    <div class="detail">
                        <span class="detail-label">🌅 Sunrise</span>
                        <span id="sunrise">06:30</span>
                    </div>
                    <div class="detail">
                        <span class="detail-label">🌇 Sunset</span>
                        <span id="sunset">18:45</span>
                    </div>
                </div>
            </div>

            <!-- 5-Day Forecast -->
            <div class="forecast-section">
                <h3>5-Day Forecast</h3>
                <div id="forecast-container" class="forecast-container"></div>
            </div>
        </div>

        <footer>
            <p>Weather data from OpenWeatherMap | Week 4 Capstone Project</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
